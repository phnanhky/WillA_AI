# DEPRECATED path — dùng bản chuẩn: /opt/willa/infra/docker-compose.yml (repo: infra/docker-compose.yml)
# Giữ file này đồng bộ với infra/ để deploy workflow và tài liệu cũ vẫn tham chiếu được.

# VPS: /opt/willa/infra/docker-compose.yml
# Host Caddy: https://willaai.tech → 127.0.0.1:3000 (FE proxy /api, /ws-stomp → backend)
#
# Setup:
#   cp .env.example .env   # chỉnh mật khẩu + VITE_*
#   docker compose --env-file .env up -d --build
#
# Secrets JWT/PayOS/R2: /opt/willa/be/.env và /opt/willa/ai/.env

name: willa

services:
  postgres:
    image: postgres:16-alpine
    container_name: willa-ai-postgres
    restart: unless-stopped
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
    environment:
      POSTGRES_DB: willa_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - willa-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d willa_ai"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: willa-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - willa-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: willa-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - willa-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  ai-server:
    build: /opt/willa/ai
    container_name: ai-server
    restart: unless-stopped
    env_file:
      - /opt/willa/ai/.env
    environment:
      PUBLIC_BASE_URL: ${AI_PUBLIC_BASE_URL:-https://willaai.tech/ai}
      AI_ROUTER_REPLY_LANG: ${AI_ROUTER_REPLY_LANG:-auto}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - willa-net
    depends_on:
      redis:
        condition: service_healthy

  backend:
    build: /opt/willa/be
    container_name: willa-backend
    restart: unless-stopped
    env_file:
      - /opt/willa/be/.env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      HIKARI_MAX_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE:-30}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS:-150}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/willa_ai
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ELASTICSEARCH_URI: http://elasticsearch:9200
      AI_SERVER_URL: http://ai-server:8000
      APP_BASE_URL: ${APP_BASE_URL:-https://willaai.tech}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-https://willaai.tech}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      ai-server:
        condition: service_started
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - willa-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/actuator/health"]
      interval: 20s
      timeout: 10s
      start_period: 300s
      retries: 8

  frontend:
    build:
      context: /opt/willa/fe
      dockerfile: Dockerfile
      args:
        VITE_WILLA_API_URL: ${VITE_WILLA_API_URL:-}
        VITE_AI_SERVER_URL: ${VITE_AI_SERVER_URL:-/ai}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FACEBOOK_APP_ID: ${VITE_FACEBOOK_APP_ID:-}
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
        VITE_GA_SEND_USER_ID: ${VITE_GA_SEND_USER_ID:-0}
    container_name: willa-frontend
    restart: unless-stopped

  # Python AI Server (Qwen)
  ai-server:
    build:
      context: ../qwenv3vagenAI-main
      dockerfile: Dockerfile
    container_name: willa-ai-server
    env_file:
      - .env       # Tái sử dụng file .env từ thư mục Java BE để lấy DASHSCOPE_API_KEY
    depends_on:
      backend:
        condition: service_healthy
      ai-server:
        condition: service_started
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - willa-net

volumes:
  pgdata:
  redis_data:
  es_data:

networks:
  willa-net:
    driver: bridge

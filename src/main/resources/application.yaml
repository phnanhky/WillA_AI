spring:
  servlet:
    multipart:
      enabled: true
      # PDF tối đa 512MB; CSV 50MB; ảnh 20MB (siết theo từng loại ở app.upload.*)
      max-file-size: 512MB
      # Tổng request: PDF / nhiều ảnh gói PRO tối đa 512MB
      max-request-size: 512MB
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${SPRING_JPA_SHOW_SQL}
        show_sql: ${SPRING_JPA_SHOW_SQL}
    show-sql: ${SPRING_JPA_SHOW_SQL}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  cache:
    type: redis
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

app:
  jwtSecret: ${JWT_SECRET}
  jwtAccessTokenExpiry: ${JWT_ACCESS_TOKEN_EXPIRY}
  jwtRefreshTokenExpiry: ${JWT_REFRESH_TOKEN_EXPIRY}
  mail:
    from: ${MAIL_FROM}
  baseUrl: ${APP_BASE_URL}
  frontendUrl: ${APP_FRONTEND_URL:${APP_BASE_URL}}
  upload:
    # Mỗi ảnh tối đa 20MB (gửi AI giữ nguyên chất lượng trong giới hạn này)
    max-image-bytes: ${UPLOAD_MAX_IMAGE_BYTES:20971520}
    # PDF/PSD tối đa 512MB
    max-pdf-bytes: ${UPLOAD_MAX_PDF_BYTES:536870912}
    # CSV tối đa 50MB
    max-csv-bytes: ${UPLOAD_MAX_CSV_BYTES:52428800}
    # Tổng dung lượng một request (PDF / nhiều ảnh gói PRO): 512MB
    max-request-bytes: ${UPLOAD_MAX_REQUEST_BYTES:536870912}

ai:
  server:
    # qwenv3vagenAI FastAPI root (NOT /v1/chat/completions). Docker: http://ai-server:8000
    url: ${AI_SERVER_URL:http://localhost:8000}
    chat: /chat
    prepare-regen: /prepare-regen
    regen-image: /regen-image
    suggest-style: /api/suggest-style
    extract-layers: /extract-layers
    chat-generate: /chat-generate
    health: /health
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
  qwen:
    model: ${QWEN_MODEL:qwen3-vl-flash}
    token-estimate:
      patch-factor: 28
      min-pixels: 3136
      max-pixels: 12845056
      chars-per-token: 3.2
      safety-margin-percent: 2
      feedback:
        base-prompt-tokens: 3386
        output-tokens-typical: 1150
        small-image-boost-threshold: 1300
        small-image-boost-factor: 0.86
        wallet-buffer-tokens: 100
      chat:
        system-and-context-tokens: 400
        output-tokens: 900
  xai:
    api-key: ${XAI_API_KEY:}
  imgbb:
    api-key: ${IMGBB_API_KEY:}
  fal:
    key: ${FAL_KEY:}

admin:
  default:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
    name: ${ADMIN_NAME}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}

firebase:
  project-id: ${FIREBASE_PROJECT_ID:}
  private-key-id: ${FIREBASE_PRIVATE_KEY_ID:}
  private-key: ${FIREBASE_PRIVATE_KEY:}
  client-email: ${FIREBASE_CLIENT_EMAIL:}
  client-id: ${FIREBASE_CLIENT_ID:}
  auth-uri: ${FIREBASE_AUTH_URI:}
  token-uri: ${FIREBASE_TOKEN_URI:}
  auth-provider-x509-cert-url: ${FIREBASE_AUTH_PROVIDER_X509_CERT_URL:}
  client-x509-cert-url: ${FIREBASE_CLIENT_X509_CERT_URL:}

logging:
  level:
    root: INFO
    com.willa.ai.backend: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

payos:
  client-id: ${PAYOS_CLIENT_ID}
  api-key: ${PAYOS_API_KEY}
  checksum-key: ${PAYOS_CHECKSUM_KEY}
  return-url: ${PAYOS_RETURN_URL}
  cancel-url: ${PAYOS_CANCEL_URL}

facebook:
  app-id: ${FACEBOOK_APP_ID:}
  app-secret: ${FACEBOOK_APP_SECRET:}

cloudflare:
  r2:
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    endpoint: ${R2_ENDPOINT}
    bucket: ${R2_BUCKET}
    public-url: ${R2_PUBLIC_URL}
    # Giới hạn kích thước object trên R2 (mặc định 3MB). Ảnh lớn hơn sẽ được nén JPEG trước khi upload.
    max-upload-bytes: ${R2_MAX_UPLOAD_BYTES:3145728}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    redis:
      enabled: false
    mail:
      enabled: false

resilience4j:
  circuitbreaker:
    instances:
      payosCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 15s
        failureRateThreshold: 50
  retry:
    instances:
      payosRetry:
        maxAttempts: 3
        waitDuration: 2s
---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  cache:
    type: none
